<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Beabots - Beacon Automation</title>
<link rel="stylesheet" href="css/theme.css" />
<style>
  /* Dashboard-specific layout that doesn't need to be shared with other windows */
  .header {
    display: flex;
    align-items: center;
    padding: 16px 16px 6px 16px;
  }
  .header .brand {
    color: var(--accent);
    font-size: 20px;
    font-weight: bold;
  }
  .header .version {
    color: var(--text-sec);
    font-size: 11px;
    margin-left: 2px;
  }
  .header .status-group {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .header .status-label {
    font-size: 8pt;
    color: var(--text-sec);
  }
  .divider { height: 1px; background: var(--border); margin: 0 16px 6px 16px; }

  .toolbar {
    display: flex;
    align-items: center;
    padding: 0 16px 8px 16px;
    gap: 6px;
  }
  .toolbar .push-right { margin-left: auto; display: flex; gap: 6px; }

  .body {
    flex: 1;
    display: flex;
    gap: 12px;
    padding: 0 16px 12px 16px;
    min-height: 0;
  }
  .col { flex: 1; display: flex; flex-direction: column; min-height: 0; }

  #transmittalsInput {
    flex: 1;
    resize: none;
    width: 100%;
  }
  .input-wrapper { flex: 1; display: flex; min-height: 0; margin: 0 14px 8px 14px; }

  .bottom-row {
    display: flex;
    align-items: center;
    padding: 0 14px 6px 14px;
  }
  .bottom-row label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
  .bottom-row .count { margin-left: auto; }

  #startBtn { margin: 2px 14px 14px 14px; }

  #logBox { height: 150px; margin: 0 14px 8px 14px; flex: none; }
  #reportBox { flex: 1; margin: 0 14px 14px 14px; min-height: 0; }

  .progress-frame { padding: 0 16px 10px 16px; }
</style>
</head>
<body>
  <div class="app-window" style="border: none;"> <!-- main dashboard keeps no outer accent border, matches ui.py's plain root -->

    <div class="titlebar">
      <span class="icon">⚡</span>
      <span class="title">BEABOTS - BEACON AUTOMATION</span>
      <span class="spacer"></span>
      <div class="titlebar-btn" id="btnMinimize">─</div>
      <div class="titlebar-btn" id="btnMaximize">🗖</div>
      <div class="titlebar-btn close" id="btnClose">✕</div>
    </div>

    <div class="header">
      <span class="brand">BEABOTS</span>
      <span class="version">v3.0</span>
      <div class="status-group">
        <span class="status-label" id="statusLabel">IDLE</span>
        <span class="status-dot" id="statusDot"></span>
      </div>
    </div>
    <div class="divider"></div>

    <div class="toolbar">
      <button class="cyber-btn" id="btnSettings">⚙ Settings</button>
      <div class="push-right">
        <button class="cyber-btn" id="btnCf2">➜ Move to CF2</button>
        <button class="cyber-btn" id="btnUploadSoa">⇪ Upload SOA</button>
        <button class="cyber-btn" id="btnAbout">ℹ About</button>
      </div>
    </div>

    <div class="body">
      <div class="col">
        <div class="section-label"><span>▸ CF4 AUTO MAPPING</span><span class="rule"></span></div>
        <div class="section-label"><span>▸ INPUT TRANSMITTAL NUMBERS:</span><span class="rule"></span></div>
        <div class="input-wrapper card">
          <textarea id="transmittalsInput" placeholder="One transmittal number per line..."></textarea>
        </div>
        <div class="bottom-row">
          <label class="text-sec text-small">
            <input type="checkbox" id="autoEncodeCf4" />
            Include Auto Encode CF4
          </label>
          <span class="count text-sec text-small" id="countLabel">0 transmittals</span>
        </div>
        <button class="cyber-btn" id="startBtn" style="text-align:center;">▶ START AUTOMATION</button>
      </div>

      <div class="col">
        <div class="section-label"><span>▸ AUTOMATION LOGS</span><span class="rule"></span></div>
        <div class="log-box" id="logBox"></div>

        <div class="section-label"><span>▸ SUMMARY REPORT</span><span class="rule"></span></div>
        <div class="log-box" id="reportBox" style="white-space: pre;"></div>
      </div>
    </div>

    <div class="progress-frame">
      <div class="progress-track">
        <div class="progress-fill idle" id="progressFill"></div>
      </div>
    </div>
  </div>

  <div id="modalRoot"></div>

  <!-- socket.io-client — install via `npm install socket.io-client` in the
       Electron project; adjust this path once package.json/electron-builder
       layout is finalized. -->
  <script src="../node_modules/socket.io-client/dist/socket.io.min.js"></script>
  <script src="js/common.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
