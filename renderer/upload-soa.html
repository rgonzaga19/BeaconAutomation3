<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Upload SOA</title>
<link rel="stylesheet" href="css/theme.css" />
<style>
  .section-row { margin: 0 14px 4px 14px; display: flex; }
  .folder-input-wrapper {
    flex: 1;
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 8px;
  }
  #soaFolderInput {
    width: 100%;
    background: transparent;
    color: var(--text-pri);
    border: none;
    font-family: var(--font-mono);
    font-size: 9pt;
  }
  #browseBtn { margin-left: 8px; }

  .body { flex: 1; display: flex; gap: 16px; padding: 8px 16px 12px 16px; min-height: 0; }
  .col { flex: 1; display: flex; flex-direction: column; min-height: 0; }

  .input-wrapper { flex: 1; margin: 0 14px 8px 14px; min-height: 0; }
  #transmittalsInput { width: 100%; height: 100%; resize: none; }

  .bottom-row { display: flex; padding: 0 14px 6px 14px; }
  .bottom-row .count { margin-left: auto; }

  #automateBtn { margin: 2px 14px 14px 14px; }

  #logBox { flex: 1; margin: 0 14px 8px 14px; min-height: 0; }
</style>
</head>
<body>
  <div class="app-window">

    <div class="titlebar">
      <span class="icon">⚡</span>
      <span class="title">UPLOAD SOA</span>
      <span class="spacer"></span>
      <div class="titlebar-btn" id="btnMinimize">─</div>
      <div class="titlebar-btn" id="btnMaximize">🗖</div>
      <div class="titlebar-btn close" id="btnClose">✕</div>
    </div>

    <div class="section-label"><span>▸ SOA FOLDER</span><span class="rule"></span></div>
    <div class="section-row">
      <div class="folder-input-wrapper">
        <input type="text" id="soaFolderInput" readonly />
      </div>
      <button class="cyber-btn" id="browseBtn">📁  BROWSE</button>
    </div>

    <div class="body">
      <div class="col">
        <div class="section-label"><span>▸ TRANSMITTAL NUMBERS</span><span class="rule"></span></div>
        <div class="input-wrapper card">
          <textarea id="transmittalsInput" placeholder="One transmittal number per line..."></textarea>
        </div>
        <div class="bottom-row">
          <span class="count text-sec text-small" id="countLabel">0 transmittals</span>
        </div>
        <button class="solid-btn" id="automateBtn">▶  AUTOMATE UPLOAD</button>
      </div>

      <div class="col">
        <div class="section-label"><span>▸ AUTOMATION LOGS</span><span class="rule"></span></div>
        <div class="log-box" id="logBox"></div>
      </div>
    </div>
  </div>

  <div id="modalRoot"></div>

  <script src="../node_modules/socket.io-client/dist/socket.io.min.js"></script>
  <script src="js/common.js"></script>
  <script src="js/upload-soa.js"></script>
</body>
</html>
